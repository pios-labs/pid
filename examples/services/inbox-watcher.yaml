name: inbox-watcher
cwd: ~/inbox
prompt: |
  Check ~/inbox/ for new files. For each, process per AGENTS.md
  and move handled files to ~/inbox/processed/.

model:
  provider: zai
  id: glm-5.1

trigger:
  type: file_watch
  path: ~/inbox/
  events: [add]

budget:
  daily_usd: 2.00
  on_exceed: pause

restart:
  policy: on-failure
  max_consecutive: 3

gate:
  - bash:rm
  - bash:git push
  - write            # gate every write (v0 can't path-match yet — ADR 0004)

auto_approve:
  - read
  - grep
  - find
  - ls
