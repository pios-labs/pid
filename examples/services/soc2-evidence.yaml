# Scheduled compliance evidence collector — "auditable autonomy". Report-only:
# the gate blocks every write path, and pid records every action, cost, and
# approval to the service's event log, which is an audit trail by construction.
name: soc2-evidence
cwd: ~/work/infra
prompt: |
  Collect this week's SOC2 evidence: check IAM policies, S3 bucket settings,
  and CloudTrail config against controls.md. Write findings to
  evidence/<date>.md. Report only — change nothing.

# Scheduled by your OS — pid supervises the run, cron triggers it (ADR 0014):
#   0 6 * * 1  pid run soc2-evidence
trigger:
  type: manual

budget:
  weekly_usd: 8.00
  on_exceed: notify

gate:
  - bash:aws iam            # gate all IAM ops (v0 matches whole tokens, not verb prefixes)
  - bash:aws s3
  - bash:terraform apply
