name: morning-report
cwd: ~/projects/work
prompt: |
  Summarize yesterday's git activity across all repos under ~/projects.
  Write the summary to ~/reports/$(date +%F).md.

model:
  provider: anthropic
  id: claude-sonnet-4-5
  thinking: medium

trigger:
  type: cron
  schedule: "0 6 * * *"

budget:
  daily_usd: 0.50
  on_exceed: notify

restart:
  policy: never
