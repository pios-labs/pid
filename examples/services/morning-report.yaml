name: morning-report
cwd: ~/projects/work
prompt: |
  Summarize yesterday's git activity across all repos under ~/projects.
  Write the summary to ~/reports/$(date +%F).md.

model:
  provider: anthropic
  id: claude-sonnet-4-5
  thinking: medium

# Scheduled by your OS — pid supervises the run, cron triggers it (ADR 0014):
#   0 6 * * *  pid run morning-report
trigger:
  type: manual

budget:
  daily_usd: 0.50
  on_exceed: notify

restart:
  policy: never
